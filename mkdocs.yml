site_name: Steam Client
site_description: Documentation for the steam-client Python package
site_url: https://github.com/garulf/steam-client
repo_url: https://github.com/garulf/steam-client
repo_name: garulf/steam-client

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage: usage.md
  - API Reference:
    - api/index.md
    - Steam: api/steam.md
    - Library: api/library.md
    - Games & Apps: api/games.md
    - Commands: api/commands.md
    - Users: api/users.md
    - Utilities: api/utils.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_bases: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            members_order: source
