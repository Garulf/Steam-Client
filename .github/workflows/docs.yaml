name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "steam_client/**/*.py"
      - "requirements-docs.in"
      - "requirements-docs.txt"
      - "tox.ini"
      - ".github/workflows/docs.yaml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "steam_client/**/*.py"
      - "requirements-docs.in"
      - "requirements-docs.txt"
      - "tox.ini"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

jobs:
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Build docs in strict mode
        run: tox -e docs
