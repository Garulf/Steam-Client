[tox]
package_name = "steam_client"
envlist = lint, type, docs, py{311,312,313,314}

[testenv]
deps = pytest
commands =
    pytest {posargs:tests}

[testenv:lint]
description = Run all linting checks
skip_install = true
deps =
    flake8
    flake8-markdown
commands = flake8 {[tox]package_name}
           flake8 --extend-ignore=E999,F821 README.md

[testenv:type]
description = Run all type checks
skip_install = true
deps = mypy
commands = mypy {[tox]package_name}

[testenv:docs]
description = Lint docs-referenced modules and build docs with strict checks
deps =
    flake8
    mkdocs
    mkdocs-material
    mkdocstrings[python]
commands =
    flake8 steam_client/steam.py steam_client/library.py steam_client/commands.py steam_client/game.py steam_client/shortcut.py
    mkdocs build --strict

[gh-actions]
python =
    3.11: lint, type, docs, py311
    3.12: py312
    3.13: py313
    3.14: py314